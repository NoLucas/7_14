<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장바구니 - Cafe Moment</title>
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="list.css" />
</head>
<body>
  <header class="page-header glass">
    <a href="../menus/list.html" class="icon-btn" aria-label="메뉴로">‹</a>
    <h1>장바구니</h1>
    <div class="header-actions">
      <div class="auth-status" id="authStatus">
        <a href="../auth/login.html" class="icon-btn" aria-label="로그인">👤</a>
      </div>
      <button class="icon-btn" id="clearCartBtn" type="button" aria-label="장바구니 비우기">🗑</button>
    </div>
  </header>

  <main class="container basket-page">
    <section class="basket-summary glass" id="basketSummary">
      <div>
        <span class="summary-label">담긴 메뉴</span>
        <strong class="summary-value" id="summaryCount">0개</strong>
      </div>
      <div>
        <span class="summary-label">예상 결제 금액</span>
        <strong class="summary-value" id="summaryPrice">0원</strong>
      </div>
    </section>

    <section class="latte-art-request glass" id="latteArtRequest" hidden></section>

    <section id="basketContent"></section>
  </main>

  <div class="modal-overlay" id="checkoutModalOverlay" hidden>
    <div class="modal-panel glass" role="dialog" aria-modal="true" aria-labelledby="checkoutModalTitle">
      <div class="modal-header">
        <h2 id="checkoutModalTitle">주문하기</h2>
        <button type="button" class="modal-close" id="checkoutModalCloseBtn" aria-label="닫기">✕</button>
      </div>
      <div id="checkoutModalBody"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth-client.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/utils.js"></script>
  <script src="list.js"></script>
</body>
</html>
